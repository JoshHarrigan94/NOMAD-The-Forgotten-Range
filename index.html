<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>NOMAD: The Forgotten Range</title>

<style>
  :root {
    --bg: #111827;
    --panel: rgba(12, 18, 30, 0.58);
    --text: rgba(255,255,255,0.92);
    --muted: rgba(255,255,255,0.62);
    --line: rgba(255,255,255,0.18);
    --accent: #7dd3fc;
    --warm: #fb7185;
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--text);
  }

  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    touch-action: none;
    background: #111827;
  }

  .hud {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }

  .top-left {
    position: absolute;
    top: 26px;
    left: 28px;
    max-width: 320px;
  }

  .region {
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text);
    margin-bottom: 14px;
  }

  .objective {
    padding-left: 14px;
    border-left: 2px solid var(--warm);
    color: var(--muted);
    font-size: 13px;
    line-height: 1.5;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .top-right {
    position: absolute;
    top: 26px;
    right: 28px;
    text-align: right;
    color: var(--text);
    font-size: 14px;
    letter-spacing: 0.12em;
  }

  .bottom-left {
    position: absolute;
    left: 28px;
    bottom: 28px;
    width: 220px;
  }

  .bar-row {
    display: grid;
    grid-template-columns: 24px 1fr;
    align-items: center;
    gap: 10px;
    margin: 10px 0;
    color: white;
    font-size: 15px;
  }

  .bar {
    height: 8px;
    background: rgba(255,255,255,0.16);
    overflow: hidden;
  }

  .bar > span {
    display: block;
    height: 100%;
    width: 70%;
    background: white;
  }

  .bar.energy > span { background: #67e8f9; }
  .bar.stamina > span { background: #f472b6; }
  .bar.focus > span { background: #c4b5fd; }

  .bottom-centre {
    position: absolute;
    bottom: 34px;
    left: 50%;
    transform: translateX(-50%);
    min-width: 260px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  .bottom-centre::before,
  .bottom-centre::after {
    content: "";
    display: inline-block;
    width: 80px;
    height: 1px;
    background: var(--line);
    vertical-align: middle;
    margin: 0 14px;
  }

  .mini-help {
    position: absolute;
    right: 28px;
    bottom: 28px;
    padding: 12px 14px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.7;
    backdrop-filter: blur(10px);
  }

  .title-card {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: grid;
    place-items: center;
    background:
      radial-gradient(circle at 70% 40%, rgba(251, 113, 133, 0.22), transparent 35%),
      radial-gradient(circle at 25% 30%, rgba(125, 211, 252, 0.20), transparent 30%),
      rgba(6, 10, 18, 0.88);
    transition: opacity 400ms ease;
  }

  .title-inner {
    text-align: center;
    padding: 30px;
  }

  .mark {
    font-size: 12px;
    letter-spacing: 0.4em;
    color: var(--muted);
    margin-bottom: 14px;
  }

  h1 {
    margin: 0;
    font-size: clamp(52px, 11vw, 130px);
    letter-spacing: 0.28em;
    font-weight: 500;
  }

  .subtitle {
    margin-top: 14px;
    letter-spacing: 0.24em;
    color: var(--muted);
    text-transform: uppercase;
    font-size: 13px;
  }

  .start {
    margin-top: 34px;
    display: inline-block;
    border: 1px solid var(--line);
    background: rgba(255,255,255,0.06);
    padding: 14px 22px;
    border-radius: 999px;
    letter-spacing: 0.16em;
    font-size: 12px;
    text-transform: uppercase;
    color: var(--text);
  }

  .hidden {
    opacity: 0;
    pointer-events: none;
  }

  @media (max-width: 700px) {
    .top-left { top: 18px; left: 18px; }
    .top-right { top: 18px; right: 18px; font-size: 12px; }
    .bottom-left { left: 18px; bottom: 20px; width: 170px; }
    .bottom-centre { display: none; }
    .mini-help { display: none; }
  }
</style>
</head>

<body>
<canvas id="game"></canvas>

<div class="hud">
  <div class="top-left">
    <div class="region" id="regionName">The Forgotten Range</div>
    <div class="objective" id="objectiveText">
      Find a way to the observatory<br />
      Follow the old lights
    </div>
  </div>

  <div class="top-right">
    <div id="clockText">06:00</div>
    <div id="dayText" style="color:rgba(255,255,255,0.6); margin-top:6px;">DAY 1</div>
  </div>

  <div class="bottom-left">
    <div class="bar-row">⚡ <div class="bar energy"><span id="energyBar"></span></div></div>
    <div class="bar-row">⛰ <div class="bar stamina"><span id="staminaBar"></span></div></div>
    <div class="bar-row">◇ <div class="bar focus"><span id="focusBar"></span></div></div>
  </div>

  <div class="bottom-centre" id="distanceText">0.0 KM WALKED</div>

  <div class="mini-help">
    WASD / Arrows: Move<br />
    Shift: Sprint<br />
    E: Discover place<br />
L: Discovery log<br />
M: World map<br />
R: Reset save
  </div>
</div>

<div class="title-card" id="titleCard">
  <div class="title-inner">
    <div class="mark">THE FORGOTTEN RANGE</div>
    <h1>NOMAD</h1>
    <div class="subtitle">Journey. Move. Discover.</div>
    <div class="start">Tap / Click / Press Any Key</div>
  </div>
</div>

<script>
/* =========================================================
   NOMAD: THE FORGOTTEN RANGE
   Part 1 — Single-file playable foundation

   Current systems:
   - canvas renderer
   - procedural low-poly world
   - camera follow
   - player movement
   - sprint/stamina
   - day/night colour cycle
   - discovery beacons
   - minimal HUD
   - localStorage persistence
========================================================= */

/* =========================================================
   01. CANVAS SETUP
========================================================= */

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));

let view = {
  w: 0,
  h: 0,
  cx: 0,
  cy: 0
};

function resizeCanvas() {
  view.w = window.innerWidth;
  view.h = window.innerHeight;
  view.cx = view.w / 2;
  view.cy = view.h / 2;

  canvas.width = Math.floor(view.w * DPR);
  canvas.height = Math.floor(view.h * DPR);

  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}

window.addEventListener("resize", resizeCanvas);
resizeCanvas();

/* =========================================================
   02. CONFIG
========================================================= */

const CONFIG = {
  saveKey: "nomad_forgotten_range_save_v1",

  world: {
    seed: 92417,
    chunkSize: 420,
    renderRadius: 4,
    horizonParallax: 0.18
  },

  player: {
    baseSpeed: 145,
    sprintSpeed: 235,
    acceleration: 11,
    friction: 8,
    radius: 12,
staminaDrain: 22,
staminaRecover: 16,

walkAcceleration: 9,
sprintAcceleration: 13,
turnResponsiveness: 10,
coastFriction: 3.2,
brakeFriction: 8.5,
maxVelocity: 320,
cameraLead: 42,
cameraDrift: 3.8
  },

  time: {
    dayLengthSeconds: 520,
    startHour: 6
  },

  discovery: {
  interactionRadius: 82,
  notificationSeconds: 4
},

landmarks: {
  megaDistance: 2600,
  megaVisibility: 3600
},

weather: {
  transitionSpeed: 0.018,
  particleCount: 160,
  strangeLightChance: 0.000018
},

traversal: {
  climbRadius: 95,
  ringRadius: 34,
  ringRewardFocus: 6,
  ringRewardStamina: 10
}

/* =========================================================
   03. STATE
========================================================= */

const state = {
  started: false,
  paused: false,
  lastTime: performance.now(),

  distanceTravelled: 0,
  discovered: new Set(),
  discoveryLog: [],
notification: {
  text: "",
  timer: 0
},
showLog: false,
weather: {
  current: "clear",
  blend: 0,
  timer: 0,
  strangeLight: false,
  strangeLightTimer: 0
},

showMap: false,
visitedChunks: new Set(),

particles: [],
  time: {
    elapsed: 0,
    day: 1
  },
  
  traversal: {
  climbing: false,
  climbTarget: null,
  ringsCompleted: new Set(),
  ringMessageTimer: 0,
  ringMessage: ""
},

  player: {
    x: 0,
    y: 0,
    vx: 0,
    vy: 0,
    stamina: 100,
    energy: 100,
    focus: 72,
    facing: 0,
lastTerrain: "grass",
slopeX: 0,
slopeY: 0,
flow: 0
  },

  camera: {
    x: 0,
y: 0,
leadX: 0,
leadY: 0
  },

  input: {
    up: false,
    down: false,
    left: false,
    right: false,
    sprint: false,
    interact: false
  },

  pointer: {
    active: false,
    startX: 0,
    startY: 0,
    x: 0,
    y: 0
  }
};

/* =========================================================
   04. DOM REFERENCES
========================================================= */

const titleCard = document.getElementById("titleCard");
const clockText = document.getElementById("clockText");
const dayText = document.getElementById("dayText");
const energyBar = document.getElementById("energyBar");
const staminaBar = document.getElementById("staminaBar");
const focusBar = document.getElementById("focusBar");
const distanceText = document.getElementById("distanceText");
const objectiveText = document.getElementById("objectiveText");
const regionName = document.getElementById("regionName");

/* =========================================================
   05. UTILS
========================================================= */

function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

function lerp(a, b, t) {
  return a + (b - a) * t;
}

function smoothstep(edge0, edge1, x) {
  const t = clamp((x - edge0) / (edge1 - edge0), 0, 1);
  return t * t * (3 - 2 * t);
}

function dist(a, b, c, d) {
  return Math.hypot(c - a, d - b);
}

function hash(n) {
  n = Math.sin(n) * 43758.5453123;
  return n - Math.floor(n);
}

function hash2(x, y, seed = CONFIG.world.seed) {
  return hash(x * 127.1 + y * 311.7 + seed * 0.017);
}

function noise2(x, y) {
  const ix = Math.floor(x);
  const iy = Math.floor(y);
  const fx = x - ix;
  const fy = y - iy;

  const a = hash2(ix, iy);
  const b = hash2(ix + 1, iy);
  const c = hash2(ix, iy + 1);
  const d = hash2(ix + 1, iy + 1);

  const ux = fx * fx * (3 - 2 * fx);
  const uy = fy * fy * (3 - 2 * fy);

  return lerp(lerp(a, b, ux), lerp(c, d, ux), uy);
}

function fractalNoise(x, y) {
  let total = 0;
  let amp = 1;
  let freq = 1;
  let norm = 0;

  for (let i = 0; i < 5; i++) {
    total += noise2(x * freq, y * freq) * amp;
    norm += amp;
    amp *= 0.5;
    freq *= 2;
  }

  return total / norm;
}

function worldToScreen(x, y) {
  return {
    x: x - state.camera.x + view.cx,
    y: y - state.camera.y + view.cy
  };
}

function screenToWorld(x, y) {
  return {
    x: x + state.camera.x - view.cx,
    y: y + state.camera.y - view.cy
  };
}

/* =========================================================
   06. SAVE / LOAD
========================================================= */

function saveGame() {
  const payload = {
    player: {
      x: state.player.x,
      y: state.player.y,
      stamina: state.player.stamina,
      energy: state.player.energy,
      focus: state.player.focus
    },
    time: state.time,
    distanceTravelled: state.distanceTravelled,
    discovered: Array.from(state.discovered),
discoveryLog: state.discoveryLog,
ringsCompleted: Array.from(state.traversal.ringsCompleted),
visitedChunks: Array.from(state.visitedChunks)
  };

  localStorage.setItem(CONFIG.saveKey, JSON.stringify(payload));
}

function loadGame() {
  try {
    const raw = localStorage.getItem(CONFIG.saveKey);
    if (!raw) return;

    const data = JSON.parse(raw);

    if (data.player) {
      state.player.x = Number(data.player.x || 0);
      state.player.y = Number(data.player.y || 0);
      state.player.stamina = Number(data.player.stamina || 100);
      state.player.energy = Number(data.player.energy || 100);
      state.player.focus = Number(data.player.focus || 72);
    }

    if (data.time) {
      state.time.elapsed = Number(data.time.elapsed || 0);
      state.time.day = Number(data.time.day || 1);
    }

    if (typeof data.distanceTravelled === "number") {
      state.distanceTravelled = data.distanceTravelled;
    }

    if (Array.isArray(data.discovered)) {
      state.discovered = new Set(data.discovered);
    }
    if (Array.isArray(data.discoveryLog)) {
  state.discoveryLog = data.discoveryLog;
}
if (Array.isArray(data.ringsCompleted)) {
  state.traversal.ringsCompleted = new Set(data.ringsCompleted);
}
if (Array.isArray(data.visitedChunks)) {
  state.visitedChunks = new Set(data.visitedChunks);
}
  } catch (err) {
    console.warn("Save failed to load", err);
  }
}

function resetSave() {
  localStorage.removeItem(CONFIG.saveKey);
  location.reload();
}

loadGame();

/* =========================================================
   07. INPUT
========================================================= */

const keyMap = {
  ArrowUp: "up",
  KeyW: "up",
  ArrowDown: "down",
  KeyS: "down",
  ArrowLeft: "left",
  KeyA: "left",
  ArrowRight: "right",
  KeyD: "right",
KeyL: "log",
KeyM: "map",
ShiftLeft: "sprint",
  ShiftRight: "sprint"
};

window.addEventListener("keydown", (e) => {
  startGame();

  if (keyMap[e.code]) {
    state.input[keyMap[e.code]] = true;
  }

  if (e.code === "KeyE") {
    state.input.interact = true;
  }
  if (e.code === "KeyM") {
  state.showMap = !state.showMap;
}
  if (e.code === "KeyL") {
  state.showLog = !state.showLog;
}

  if (e.code === "KeyR") {
    resetSave();
  }
});

window.addEventListener("keyup", (e) => {
  if (keyMap[e.code]) {
    state.input[keyMap[e.code]] = false;
  }

  if (e.code === "KeyE") {
    state.input.interact = false;
  }
});

canvas.addEventListener("pointerdown", (e) => {
  startGame();
  state.pointer.active = true;
  state.pointer.startX = e.clientX;
  state.pointer.startY = e.clientY;
  state.pointer.x = e.clientX;
  state.pointer.y = e.clientY;
});

canvas.addEventListener("pointermove", (e) => {
  state.pointer.x = e.clientX;
  state.pointer.y = e.clientY;
});

window.addEventListener("pointerup", () => {
  state.pointer.active = false;
});

titleCard.addEventListener("click", startGame);

function startGame() {
  if (state.started) return;
  state.started = true;
  titleCard.classList.add("hidden");
}

/* =========================================================
   08. WORLD GENERATION
========================================================= */

function getTerrainAt(x, y) {
  const n1 = fractalNoise(x * 0.0012, y * 0.0012);
  const n2 = fractalNoise(x * 0.0035 + 90, y * 0.0035 - 40);
  const height = n1 * 0.75 + n2 * 0.25;

  if (height < 0.28) return "water";
  if (height < 0.38) return "sand";
  if (height < 0.58) return "grass";
  if (height < 0.74) return "rock";
  return "snow";
}

function getTerrainProfile(type) {
  const profiles = {
    water: {
      speed: 0.42,
      acceleration: 0.55,
      friction: 2.8,
      flowGain: 0.25,
      staminaCost: 2.2,
      label: "Cold water"
    },
    sand: {
      speed: 0.76,
      acceleration: 0.72,
      friction: 6.2,
      flowGain: 0.55,
      staminaCost: 1.2,
      label: "Soft sand"
    },
    grass: {
      speed: 1,
      acceleration: 1,
      friction: 3.2,
      flowGain: 1,
      staminaCost: 0.2,
      label: "Open ground"
    },
    rock: {
      speed: 0.82,
      acceleration: 0.78,
      friction: 2.2,
      flowGain: 1.35,
      staminaCost: 1.9,
      label: "Stone ridges"
    },
    snow: {
      speed: 0.72,
      acceleration: 0.58,
      friction: 0.95,
      flowGain: 1.7,
      staminaCost: 0.8,
      label: "Powder snow"
    }
  };

  return profiles[type] || profiles.grass;
}

function getTerrainAction(type) {
  const actions = {
    water: "wade",
    sand: "push",
    grass: "travel",
    rock: "climb",
    snow: "glide"
  };

  return actions[type] || "travel";
}

function getAltitudeAt(x, y) {
  return fractalNoise(x * 0.0012, y * 0.0012);
}

function getTraversalDifficulty(type) {
  const difficulty = {
    water: 1.25,
    sand: 1.1,
    grass: 0.85,
    rock: 1.45,
    snow: 1.2
  };

  return difficulty[type] || 1;
}

function getSlopeVector(x, y) {
  const sample = 90;

  const left = fractalNoise((x - sample) * 0.0012, y * 0.0012);
  const right = fractalNoise((x + sample) * 0.0012, y * 0.0012);
  const up = fractalNoise(x * 0.0012, (y - sample) * 0.0012);
  const down = fractalNoise(x * 0.0012, (y + sample) * 0.0012);

  return {
    x: (left - right) * 2,
    y: (up - down) * 2
  };
}

function terrainColour(type, light) {
  const palettes = {
    water: ["#577b9b", "#3f647f"],
    sand: ["#c8a77d", "#a98966"],
    grass: ["#5f7f69", "#425f52"],
    rock: ["#5c6073", "#3f4354"],
    snow: ["#d6d8df", "#9fa8ba"]
  };

  const pair = palettes[type] || palettes.grass;
  return light > 0.5 ? pair[0] : pair[1];
}

function getChunkKey(cx, cy) {
  return `${cx},${cy}`;
}

function getVisibleChunks() {
  const size = CONFIG.world.chunkSize;
  const camChunkX = Math.floor(state.camera.x / size);
  const camChunkY = Math.floor(state.camera.y / size);
  const chunks = [];

  for (let y = camChunkY - CONFIG.world.renderRadius; y <= camChunkY + CONFIG.world.renderRadius; y++) {
    for (let x = camChunkX - CONFIG.world.renderRadius; x <= camChunkX + CONFIG.world.renderRadius; x++) {
      chunks.push({ x, y, key: getChunkKey(x, y) });
    }
  }

  return chunks;
}

function getLandmarkName(type, cx, cy) {
  const prefixes = {
    beacon: ["Old", "Silent", "Amber", "North", "Fallen"],
    ruin: ["Broken", "Grey", "Hollow", "Sunken", "Forgotten"],
    camp: ["Last", "Cold", "Low", "Ash", "Wanderer's"],
    stone: ["White", "Black", "Split", "Ancient", "Glass"],
    tower: ["Signal", "Watch", "Storm", "Pale", "Far"],
    arch: ["Giant", "Dawn", "Weathered", "Twin", "High"],
    observatory: ["Moon", "Star", "Upper", "Cloud", "Final"],
    cable: ["Old", "Rust", "Eastern", "Broken", "High"]
  };

  const nouns = {
    beacon: ["Beacon", "Light", "Marker", "Signal", "Flare"],
    ruin: ["Ruin", "Gatehouse", "Shelter", "Station", "Steps"],
    camp: ["Camp", "Outpost", "Fireplace", "Rest", "Tent"],
    stone: ["Stone", "Monolith", "Marker", "Pillar", "Shard"],
    tower: ["Tower", "Relay", "Spire", "Needle", "Watch"],
    arch: ["Arch", "Pass", "Crown", "Span", "Gate"],
    observatory: ["Observatory", "Lens", "Dome", "Eye", "Platform"],
    cable: ["Cableway", "Lift", "Line", "Crossing", "Gantry"]
  };

  const p = prefixes[type] || prefixes.stone;
  const n = nouns[type] || nouns.stone;

  const a = p[Math.floor(hash2(cx + 4, cy - 9) * p.length)];
  const b = n[Math.floor(hash2(cx - 6, cy + 13) * n.length)];

  return `${a} ${b}`;
}

function getLandmarksInChunk(cx, cy) {
  const items = [];
  const size = CONFIG.world.chunkSize;
  const r = hash2(cx, cy);

  if (r > 0.72) {
    const lx = cx * size + hash2(cx + 13, cy - 7) * size;
    const ly = cy * size + hash2(cx - 4, cy + 19) * size;

    const types = ["beacon", "ruin", "camp", "stone", "tower"];
    const type = types[Math.floor(hash2(cx + 1, cy + 1) * types.length)];
    const id = `${type}:${cx}:${cy}`;

    items.push({
      id,
      type,
      name: getLandmarkName(type, cx, cy),
      x: lx,
      y: ly,
      scale: 1,
      mega: false,
      discovered: state.discovered.has(id)
    });
  }

  const megaRoll = hash2(cx * 3, cy * 3);

  if (megaRoll > 0.955) {
    const megaTypes = ["arch", "observatory", "cable", "tower"];
    const type = megaTypes[Math.floor(hash2(cx + 17, cy - 11) * megaTypes.length)];
    const id = `mega:${type}:${cx}:${cy}`;

    items.push({
      id,
      type,
      name: getLandmarkName(type, cx, cy),
      x: cx * size + size * 0.5,
      y: cy * size + size * 0.5,
      scale: 2.5 + hash2(cx - 2, cy + 8) * 1.6,
      mega: true,
      discovered: state.discovered.has(id)
    });
  }

  return items;
}

function getTraversalRingsInChunk(cx, cy) {
  const items = [];
  const size = CONFIG.world.chunkSize;
  const roll = hash2(cx - 31, cy + 47);

  if (roll < 0.82) return items;

  const x = cx * size + hash2(cx + 91, cy - 14) * size;
  const y = cy * size + hash2(cx - 22, cy + 83) * size;
  const terrain = getTerrainAt(x, y);
  const altitude = getAltitudeAt(x, y);

  if (terrain === "water") return items;

  const type = altitude > 0.68 ? "ridge-ring" : terrain === "snow" ? "glide-ring" : "path-ring";
  const id = `ring:${type}:${cx}:${cy}`;

  items.push({
    id,
    type,
    x,
    y,
    terrain,
    completed: state.traversal.ringsCompleted.has(id)
  });

  return items;
}

function getRegionName() {
  const x = state.player.x;
  const y = state.player.y;

  if (y < -3000) return "The Pale North";
  if (x > 2600) return "Amber Flats";
  if (x < -2600) return "The Broken West";
  if (y > 2800) return "South Glasslands";
  return "The Forgotten Range";
}

/* =========================================================
   09. PLAYER UPDATE
========================================================= */

function updatePlayer(dt) {
  let ix = 0;
  let iy = 0;

  if (state.input.up) iy -= 1;
  if (state.input.down) iy += 1;
  if (state.input.left) ix -= 1;
  if (state.input.right) ix += 1;

  if (state.pointer.active) {
    const dx = state.pointer.x - state.pointer.startX;
    const dy = state.pointer.y - state.pointer.startY;
    const mag = Math.hypot(dx, dy);

    if (mag > 10) {
      const strength = clamp(mag / 90, 0, 1);
      ix += (dx / mag) * strength;
      iy += (dy / mag) * strength;
    }
  }

  const inputMag = Math.hypot(ix, iy);

  if (inputMag > 0) {
    ix /= inputMag;
    iy /= inputMag;
  }

  const terrain = getTerrainAt(state.player.x, state.player.y);
  const profile = getTerrainProfile(terrain);
  const slope = getSlopeVector(state.player.x, state.player.y);

  state.player.lastTerrain = terrain;
  state.player.slopeX = lerp(state.player.slopeX, slope.x, 2.2 * dt);
  state.player.slopeY = lerp(state.player.slopeY, slope.y, 2.2 * dt);

  const sprinting = state.input.sprint && state.player.stamina > 2 && inputMag > 0;
  const targetSpeed = sprinting ? CONFIG.player.sprintSpeed : CONFIG.player.baseSpeed;
  const accel = sprinting ? CONFIG.player.sprintAcceleration : CONFIG.player.walkAcceleration;

  const desiredVx = ix * targetSpeed * profile.speed;
  const desiredVy = iy * targetSpeed * profile.speed;

  const slopeAssist = 38 * profile.flowGain;
  const slopeVx = state.player.slopeX * slopeAssist;
  const slopeVy = state.player.slopeY * slopeAssist;

  if (inputMag > 0) {
    state.player.vx = lerp(
      state.player.vx,
      desiredVx + slopeVx,
      accel * profile.acceleration * dt
    );

    state.player.vy = lerp(
      state.player.vy,
      desiredVy + slopeVy,
      accel * profile.acceleration * dt
    );
  } else {
    const friction = profile.friction || CONFIG.player.coastFriction;

    state.player.vx = lerp(state.player.vx, slopeVx, friction * dt);
    state.player.vy = lerp(state.player.vy, slopeVy, friction * dt);
  }

  const velocity = Math.hypot(state.player.vx, state.player.vy);

  if (velocity > CONFIG.player.maxVelocity) {
    const scale = CONFIG.player.maxVelocity / velocity;
    state.player.vx *= scale;
    state.player.vy *= scale;
  }

  const oldX = state.player.x;
  const oldY = state.player.y;

  state.player.x += state.player.vx * dt;
  state.player.y += state.player.vy * dt;

  const moved = dist(oldX, oldY, state.player.x, state.player.y);
  state.distanceTravelled += moved;

  const currentVelocity = Math.hypot(state.player.vx, state.player.vy);

  if (currentVelocity > 4) {
    state.player.facing = Math.atan2(state.player.vy, state.player.vx);
  }

  const terrainCost = profile.staminaCost * getTraversalDifficulty(terrain);

if (sprinting) {
  state.player.stamina -= (CONFIG.player.staminaDrain + terrainCost) * dt;
} else if (inputMag > 0 && terrain !== "grass") {
  state.player.stamina -= terrainCost * dt;
} else {
  state.player.stamina += CONFIG.player.staminaRecover * dt;
}

if (terrain === "rock" && inputMag > 0) {
  state.player.flow = lerp(state.player.flow, 0.35, 2 * dt);
}

if (terrain === "snow" && currentVelocity > 120) {
  state.player.stamina += 4 * dt;
}

  state.player.stamina = clamp(state.player.stamina, 0, 100);

  const flowTarget = clamp(currentVelocity / CONFIG.player.sprintSpeed, 0, 1);
  state.player.flow = lerp(state.player.flow, flowTarget, 3.5 * dt);
}

function updateCamera(dt) {
  const velocity = Math.hypot(state.player.vx, state.player.vy);
  const leadStrength = clamp(velocity / CONFIG.player.sprintSpeed, 0, 1);

  const targetLeadX = Math.cos(state.player.facing) * CONFIG.player.cameraLead * leadStrength;
  const targetLeadY = Math.sin(state.player.facing) * CONFIG.player.cameraLead * leadStrength;

  state.camera.leadX = lerp(state.camera.leadX, targetLeadX, CONFIG.player.cameraDrift * dt);
  state.camera.leadY = lerp(state.camera.leadY, targetLeadY, CONFIG.player.cameraDrift * dt);

  state.camera.x = lerp(state.camera.x, state.player.x + state.camera.leadX, 4.2 * dt);
  state.camera.y = lerp(state.camera.y, state.player.y + state.camera.leadY, 4.2 * dt);
}

/* =========================================================
   10. DISCOVERY
========================================================= */

function getNearbyLandmark() {
  const chunks = getVisibleChunks();

  for (const chunk of chunks) {
    const landmarks = getLandmarksInChunk(chunk.x, chunk.y);

    for (const lm of landmarks) {
      if (state.discovered.has(lm.id)) continue;

      const d = dist(state.player.x, state.player.y, lm.x, lm.y);
      if (d <= CONFIG.discovery.interactionRadius) {
        return lm;
      }
    }
  }

  return null;
}

function addDiscovery(lm) {
  if (state.discovered.has(lm.id)) return;

  state.discovered.add(lm.id);

  const entry = {
    id: lm.id,
    name: lm.name,
    type: lm.type,
    x: Math.round(lm.x),
    y: Math.round(lm.y),
    day: state.time.day,
    km: Number((state.distanceTravelled / 1000).toFixed(1))
  };

  state.discoveryLog.unshift(entry);
  state.discoveryLog = state.discoveryLog.slice(0, 80);

  state.notification.text = `Discovered: ${lm.name}`;
  state.notification.timer = CONFIG.discovery.notificationSeconds;

  state.player.focus = clamp(state.player.focus + (lm.mega ? 16 : 8), 0, 100);

  saveGame();
}

function updateDiscovery(dt) {
  const nearby = getNearbyLandmark();

  if (nearby) {
    objectiveText.innerHTML = `Press E to mark ${nearby.name}<br />${Math.round(dist(state.player.x, state.player.y, nearby.x, nearby.y))}m away`;

    if (state.input.interact) {
      addDiscovery(nearby);
    }
  } else {
    const found = state.discoveryLog.length;
    objectiveText.innerHTML = `Follow distant silhouettes<br />${found} places recorded`;
  }

  if (state.notification.timer > 0) {
    state.notification.timer -= dt;
  }
}

function getNearbyTraversalRing() {
  const chunks = getVisibleChunks();

  for (const chunk of chunks) {
    const rings = getTraversalRingsInChunk(chunk.x, chunk.y);

    for (const ring of rings) {
      if (state.traversal.ringsCompleted.has(ring.id)) continue;

      const d = dist(state.player.x, state.player.y, ring.x, ring.y);
      if (d <= CONFIG.traversal.ringRadius) {
        return ring;
      }
    }
  }

  return null;
}

function completeTraversalRing(ring) {
  state.traversal.ringsCompleted.add(ring.id);

  state.player.focus = clamp(state.player.focus + CONFIG.traversal.ringRewardFocus, 0, 100);
  state.player.stamina = clamp(state.player.stamina + CONFIG.traversal.ringRewardStamina, 0, 100);

  const label = ring.type === "glide-ring"
    ? "Glide line found"
    : ring.type === "ridge-ring"
      ? "Ridge route mastered"
      : "Path marker crossed";

  state.traversal.ringMessage = label;
  state.traversal.ringMessageTimer = 2.8;

  saveGame();
}

function updateTraversal(dt) {
  const ring = getNearbyTraversalRing();

  if (ring) {
    const speed = Math.hypot(state.player.vx, state.player.vy);
    const needsSpeed = ring.type === "glide-ring" || ring.type === "ridge-ring";

    if (!needsSpeed || speed > 110) {
      completeTraversalRing(ring);
    }
  }

  if (state.traversal.ringMessageTimer > 0) {
    state.traversal.ringMessageTimer -= dt;
  }
}

function updateExplorationMemory() {
  const size = CONFIG.world.chunkSize;
  const cx = Math.floor(state.player.x / size);
  const cy = Math.floor(state.player.y / size);
  state.visitedChunks.add(getChunkKey(cx, cy));
}

/* =========================================================
   11. TIME
========================================================= */

function updateTime(dt) {
  state.time.elapsed += dt;

  if (state.time.elapsed >= CONFIG.time.dayLengthSeconds) {
    state.time.elapsed -= CONFIG.time.dayLengthSeconds;
    state.time.day += 1;
    saveGame();
  }
}

function getDayProgress() {
  return state.time.elapsed / CONFIG.time.dayLengthSeconds;
}

function getHour() {
  const progress = getDayProgress();
  return (CONFIG.time.startHour + progress * 24) % 24;
}

function getLightLevel() {
  const hour = getHour();
  const daylight = Math.sin(((hour - 6) / 24) * Math.PI * 2);
  return clamp(daylight * 0.65 + 0.45, 0.08, 1);
}

function getSkyGradient() {
  const hour = getHour();

  if (hour < 5 || hour > 21) {
    return ["#111827", "#312e81", "#0f172a"];
  }

  if (hour < 8) {
    return ["#3b4b73", "#d89ca5", "#ffd6a5"];
  }

  if (hour < 17) {
    return ["#7aa6c2", "#b8d8d8", "#f2d3a0"];
  }

  if (hour < 20) {
    return ["#334766", "#b7798c", "#f5b56b"];
  }

  return ["#1e293b", "#5b4b7a", "#111827"];
}

function getWeatherProfile(type) {
  const profiles = {
    clear: {
      fog: 0.08,
      wind: 0.3,
      particles: false,
      tint: "rgba(255,255,255,0)"
    },

    mist: {
      fog: 0.24,
      wind: 0.18,
      particles: true,
      tint: "rgba(210,220,255,0.08)"
    },

    snow: {
      fog: 0.34,
      wind: 0.62,
      particles: true,
      tint: "rgba(220,230,255,0.12)"
    },

    rain: {
      fog: 0.18,
      wind: 0.55,
      particles: true,
      tint: "rgba(120,150,190,0.12)"
    },

    duskwind: {
      fog: 0.14,
      wind: 0.82,
      particles: true,
      tint: "rgba(255,180,120,0.08)"
    }
  };

  return profiles[type] || profiles.clear;
}

function chooseNextWeather() {
  const hour = getHour();
  const r = Math.random();

  if (hour > 20 || hour < 5) {
    if (r < 0.45) return "mist";
  }

  if (r < 0.18) return "snow";
  if (r < 0.38) return "rain";
  if (r < 0.58) return "mist";
  if (r < 0.74) return "duskwind";

  return "clear";
}

/* =========================================================
   12. RENDER WORLD
========================================================= */

function clearSky() {
  const colours = getSkyGradient();

  const grad = ctx.createLinearGradient(0, 0, view.w, view.h);
  grad.addColorStop(0, colours[0]);
  grad.addColorStop(0.58, colours[1]);
  grad.addColorStop(1, colours[2]);

  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, view.w, view.h);
}

function drawSunMoon() {
  const hour = getHour();
  const progress = hour / 24;
  const angle = progress * Math.PI * 2 - Math.PI;

  const x = view.cx + Math.cos(angle) * view.w * 0.42;
  const y = view.cy + Math.sin(angle) * view.h * 0.38;

  ctx.save();
  ctx.globalAlpha = hour > 6 && hour < 20 ? 0.86 : 0.45;
  ctx.fillStyle = hour > 6 && hour < 20 ? "#fff7cc" : "#dbeafe";
  ctx.beginPath();
  ctx.arc(x, y, hour > 6 && hour < 20 ? 32 : 22, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawWeatherTint() {
  const weather = getWeatherProfile(state.weather.current);

  ctx.save();
  ctx.fillStyle = weather.tint;
  ctx.fillRect(0, 0, view.w, view.h);
  ctx.restore();
}

function drawDistantMountains() {
  const light = getLightLevel();
  const layers = [
    { y: 0.36, amp: 80, scale: 0.0009, colour: `rgba(34, 43, 72, ${0.28 + light * 0.16})` },
    { y: 0.46, amp: 120, scale: 0.0012, colour: `rgba(23, 31, 56, ${0.34 + light * 0.18})` },
    { y: 0.58, amp: 160, scale: 0.0016, colour: `rgba(15, 23, 42, ${0.38 + light * 0.22})` }
  ];

  for (const layer of layers) {
    ctx.beginPath();
    ctx.moveTo(0, view.h);

    const parallaxX = state.camera.x * CONFIG.world.horizonParallax;
    const baseY = view.h * layer.y;

    ctx.lineTo(0, baseY);

    for (let x = 0; x <= view.w + 80; x += 80) {
      const n = fractalNoise((x + parallaxX) * layer.scale, layer.y * 10);
      const y = baseY - n * layer.amp;
      ctx.lineTo(x, y);
    }

    ctx.lineTo(view.w, view.h);
    ctx.closePath();

    ctx.fillStyle = layer.colour;
    ctx.fill();
  }
}

function drawStrangeLights() {
  if (!state.weather.strangeLight) return;

  ctx.save();

  const t = performance.now() * 0.0002;

  for (let i = 0; i < 4; i++) {
    const x = (noise2(i * 100 + t, i * 20) * view.w);
    const y = view.h * (0.22 + noise2(i * 50, t) * 0.26);

    const glow = ctx.createRadialGradient(x, y, 0, x, y, 80);

    glow.addColorStop(0, "rgba(125,211,252,0.42)");
    glow.addColorStop(1, "rgba(125,211,252,0)");

    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(x, y, 80, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function drawTerrain() {
  const chunks = getVisibleChunks();
  const size = CONFIG.world.chunkSize;
  const light = getLightLevel();

  for (const chunk of chunks) {
    const wx = chunk.x * size;
    const wy = chunk.y * size;
    const s = worldToScreen(wx, wy);

    const type = getTerrainAt(wx + size / 2, wy + size / 2);
    const localLight = hash2(chunk.x, chunk.y) > 0.5 ? light : light * 0.72;

    ctx.fillStyle = terrainColour(type, localLight);

    ctx.beginPath();

    const wobble = 46;
    const p1 = { x: s.x + hash2(chunk.x, chunk.y) * wobble, y: s.y };
    const p2 = { x: s.x + size, y: s.y + hash2(chunk.x + 1, chunk.y) * wobble };
    const p3 = { x: s.x + size - hash2(chunk.x, chunk.y + 1) * wobble, y: s.y + size };
    const p4 = { x: s.x, y: s.y + size - hash2(chunk.x - 1, chunk.y) * wobble };

    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.lineTo(p3.x, p3.y);
    ctx.lineTo(p4.x, p4.y);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = `rgba(255,255,255,${0.025 + light * 0.025})`;
    ctx.stroke();
  }
}

function drawLandmarkShape(lm, s, discovered) {
  const scale = lm.scale || 1;

  ctx.save();
  ctx.translate(s.x, s.y);
  ctx.scale(scale, scale);
  ctx.globalAlpha = discovered ? 0.35 : 1;

  if (lm.type === "beacon") {
    ctx.fillStyle = "#67e8f9";
    ctx.beginPath();
    ctx.arc(0, -18, 6, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = "#67e8f9";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, -18);
    ctx.lineTo(0, 18);
    ctx.stroke();
  }

  if (lm.type === "tower") {
    ctx.fillStyle = "#fda4af";
    ctx.beginPath();
    ctx.moveTo(0, -58);
    ctx.lineTo(-16, 18);
    ctx.lineTo(16, 18);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "#111827";
    ctx.fillRect(-6, -34, 12, 18);
  }

  if (lm.type === "ruin") {
    ctx.fillStyle = "#d8b4fe";
    ctx.fillRect(-22, -32, 9, 34);
    ctx.fillRect(8, -44, 10, 46);
    ctx.fillRect(-26, -36, 50, 7);
  }

  if (lm.type === "camp") {
    ctx.fillStyle = "#fb7185";
    ctx.beginPath();
    ctx.moveTo(0, -30);
    ctx.lineTo(-21, 12);
    ctx.lineTo(21, 12);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "#fbbf24";
    ctx.beginPath();
    ctx.arc(0, 20, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  if (lm.type === "stone") {
    ctx.fillStyle = "#cbd5e1";
    ctx.beginPath();
    ctx.moveTo(0, -36);
    ctx.lineTo(-18, 14);
    ctx.lineTo(20, 10);
    ctx.closePath();
    ctx.fill();
  }

  if (lm.type === "arch") {
    ctx.strokeStyle = "#fef3c7";
    ctx.lineWidth = 8;
    ctx.beginPath();
    ctx.arc(0, 8, 34, Math.PI, Math.PI * 2);
    ctx.stroke();

    ctx.fillStyle = "#fef3c7";
    ctx.fillRect(-40, 4, 10, 44);
    ctx.fillRect(30, 4, 10, 44);
  }

  if (lm.type === "observatory") {
    ctx.fillStyle = "#bae6fd";
    ctx.beginPath();
    ctx.arc(0, -20, 28, Math.PI, 0);
    ctx.fill();

    ctx.fillRect(-34, -20, 68, 18);

    ctx.fillStyle = "#111827";
    ctx.beginPath();
    ctx.arc(0, -24, 8, 0, Math.PI * 2);
    ctx.fill();
  }

  if (lm.type === "cable") {
    ctx.strokeStyle = "#e5e7eb";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-54, -46);
    ctx.lineTo(54, -16);
    ctx.stroke();

    ctx.fillStyle = "#e5e7eb";
    ctx.fillRect(-48, -14, 14, 42);
    ctx.fillRect(34, 0, 14, 32);
  }

  ctx.restore();
}

function drawLandmarks() {
  const chunks = getVisibleChunks();

  for (const chunk of chunks) {
    const landmarks = getLandmarksInChunk(chunk.x, chunk.y);

    for (const lm of landmarks) {
      const s = worldToScreen(lm.x, lm.y);
      const discovered = state.discovered.has(lm.id);
      const distanceToPlayer = dist(state.player.x, state.player.y, lm.x, lm.y);

      if (
        s.x < -300 ||
        s.x > view.w + 300 ||
        s.y < -300 ||
        s.y > view.h + 300
      ) continue;

      ctx.save();

      if (lm.mega && distanceToPlayer < CONFIG.landmarks.megaVisibility) {
        const glow = clamp(1 - distanceToPlayer / CONFIG.landmarks.megaVisibility, 0, 1);

        ctx.globalAlpha = discovered ? 0.16 : 0.22 + glow * 0.26;
        ctx.fillStyle = lm.type === "observatory" ? "#7dd3fc" : "#fb7185";

        ctx.beginPath();
        ctx.moveTo(s.x, s.y - 220 * lm.scale);
        ctx.lineTo(s.x - 18, s.y + 40);
        ctx.lineTo(s.x + 18, s.y + 40);
        ctx.closePath();
        ctx.fill();
      }

      if (lm.type === "beacon" || lm.type === "tower" || lm.mega) {
        const pulse = Math.sin(performance.now() * 0.004 + lm.x) * 0.5 + 0.5;

        ctx.globalAlpha = discovered ? 0.18 : 0.54;
        ctx.strokeStyle = lm.mega ? "#fda4af" : "#67e8f9";
        ctx.lineWidth = lm.mega ? 3 : 2;

        ctx.beginPath();
        ctx.moveTo(s.x, s.y - (120 + pulse * 60) * (lm.scale || 1));
        ctx.lineTo(s.x, s.y - 18);
        ctx.stroke();
      }

      drawLandmarkShape(lm, s, discovered);

      if (distanceToPlayer < 180 && !discovered) {
        ctx.globalAlpha = 0.72;
        ctx.fillStyle = "rgba(255,255,255,0.88)";
        ctx.font = "12px system-ui";
        ctx.textAlign = "center";
        ctx.fillText(lm.name, s.x, s.y - 70 * (lm.scale || 1));
      }

      ctx.restore();
    }
  }
}
function drawTraversalRings() {
  const chunks = getVisibleChunks();
  const t = performance.now() * 0.003;

  for (const chunk of chunks) {
    const rings = getTraversalRingsInChunk(chunk.x, chunk.y);

    for (const ring of rings) {
      const s = worldToScreen(ring.x, ring.y);
      const completed = state.traversal.ringsCompleted.has(ring.id);

      if (s.x < -80 || s.x > view.w + 80 || s.y < -80 || s.y > view.h + 80) continue;

      ctx.save();
      ctx.globalAlpha = completed ? 0.12 : 0.55 + Math.sin(t + ring.x) * 0.12;
      ctx.strokeStyle = ring.type === "glide-ring"
        ? "#bae6fd"
        : ring.type === "ridge-ring"
          ? "#fda4af"
          : "#fde68a";

      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(s.x, s.y, CONFIG.traversal.ringRadius + Math.sin(t + ring.y) * 3, 0, Math.PI * 2);
      ctx.stroke();

      ctx.globalAlpha *= 0.45;
      ctx.beginPath();
      ctx.arc(s.x, s.y, 5, 0, Math.PI * 2);
      ctx.fillStyle = ctx.strokeStyle;
      ctx.fill();

      ctx.restore();
    }
  }
}

function drawTraversalMessage() {
  if (state.traversal.ringMessageTimer <= 0) return;

  const alpha = clamp(state.traversal.ringMessageTimer / 2.8, 0, 1);

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = "rgba(255,255,255,0.86)";
  ctx.font = "12px system-ui";
  ctx.textAlign = "center";
  ctx.fillText(state.traversal.ringMessage.toUpperCase(), view.cx, view.h - 96);
  ctx.restore();
}

function drawPlayer() {
  const p = worldToScreen(state.player.x, state.player.y);

  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(state.player.facing + Math.PI / 2);

  ctx.fillStyle = "#111827";
  ctx.beginPath();
  ctx.moveTo(0, -18);
  ctx.lineTo(-11, 14);
  ctx.lineTo(0, 8);
  ctx.lineTo(11, 14);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = "#f97316";
  ctx.globalAlpha = 0.9;
  ctx.beginPath();
  ctx.moveTo(0, 12);
  ctx.lineTo(-8, 26);
  ctx.lineTo(8, 26);
  ctx.closePath();
  ctx.fill();

  ctx.restore();

  ctx.save();
  ctx.globalAlpha = 0.25;
  ctx.fillStyle = "#000";
  ctx.beginPath();
  ctx.ellipse(p.x, p.y + 18, 18, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawMovementTrail() {
  const velocity = Math.hypot(state.player.vx, state.player.vy);
  if (velocity < 80) return;

  const p = worldToScreen(state.player.x, state.player.y);
  const alpha = clamp((velocity - 80) / 180, 0, 0.28);

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = "#e0f2fe";
  ctx.lineWidth = 2;

  const backX = Math.cos(state.player.facing + Math.PI) * 34;
  const backY = Math.sin(state.player.facing + Math.PI) * 34;

  ctx.beginPath();
  ctx.moveTo(p.x + backX, p.y + backY);
  ctx.lineTo(p.x + backX * 2.3, p.y + backY * 2.3);
  ctx.stroke();

  ctx.restore();
}

function drawAtmosphere() {
  const light = getLightLevel();
  const weather = getWeatherProfile(state.weather.current);

  ctx.save();

  ctx.globalAlpha = (1 - light) * 0.7;
  ctx.fillStyle = "rgba(7, 10, 22, 0.52)";
  ctx.fillRect(0, 0, view.w, view.h);

  ctx.restore();

  const fogStrength = weather.fog;

  const fog = ctx.createRadialGradient(
    view.cx,
    view.cy,
    view.h * 0.08,
    view.cx,
    view.cy,
    view.h * (0.65 + fogStrength)
  );

  fog.addColorStop(0, "rgba(255,255,255,0)");
  fog.addColorStop(1, `rgba(255,255,255,${0.10 + fogStrength * 0.22})`);

  ctx.fillStyle = fog;
  ctx.fillRect(0, 0, view.w, view.h);

  if (state.weather.current === "mist") {
    ctx.fillStyle = "rgba(220,230,255,0.08)";
    ctx.fillRect(0, 0, view.w, view.h);
  }

  if (state.weather.current === "snow") {
    ctx.fillStyle = "rgba(235,240,255,0.08)";
    ctx.fillRect(0, 0, view.w, view.h);
  }

  if (state.weather.current === "rain") {
    ctx.fillStyle = "rgba(80,100,140,0.10)";
    ctx.fillRect(0, 0, view.w, view.h);
  }
}

function initParticles() {
  state.particles = [];

  for (let i = 0; i < CONFIG.weather.particleCount; i++) {
    state.particles.push({
      x: Math.random() * view.w,
      y: Math.random() * view.h,
      size: 1 + Math.random() * 3,
      speed: 20 + Math.random() * 80,
      drift: -40 + Math.random() * 80,
      alpha: 0.06 + Math.random() * 0.22
    });
  }
}

function drawParticles(dt) {
  const weather = getWeatherProfile(state.weather.current);

  if (!weather.particles) return;

  ctx.save();

  for (const p of state.particles) {
    p.x += p.drift * weather.wind * dt;
    p.y += p.speed * dt;

    if (p.y > view.h + 20) {
      p.y = -20;
      p.x = Math.random() * view.w;
    }

    if (p.x < -40) p.x = view.w + 40;
    if (p.x > view.w + 40) p.x = -40;

    ctx.globalAlpha = p.alpha;

    if (state.weather.current === "rain") {
      ctx.strokeStyle = "rgba(180,220,255,0.5)";
      ctx.lineWidth = 1;

      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x - 4, p.y + 12);
      ctx.stroke();
    } else {
      ctx.fillStyle = "rgba(255,255,255,0.7)";
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  ctx.restore();
}

function drawDiscoveryNotification() {
  if (state.notification.timer <= 0) return;

  const alpha = clamp(state.notification.timer / CONFIG.discovery.notificationSeconds, 0, 1);

  ctx.save();
  ctx.globalAlpha = Math.min(1, alpha * 1.3);

  const boxW = Math.min(420, view.w - 40);
  const boxH = 58;
  const x = view.cx - boxW / 2;
  const y = 86;

  ctx.fillStyle = "rgba(12,18,30,0.62)";
  ctx.strokeStyle = "rgba(255,255,255,0.18)";
  ctx.lineWidth = 1;

  roundRect(x, y, boxW, boxH, 18);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = "rgba(255,255,255,0.92)";
  ctx.font = "13px system-ui";
  ctx.textAlign = "center";
  ctx.letterSpacing = "2px";
  ctx.fillText(state.notification.text.toUpperCase(), view.cx, y + 35);

  ctx.restore();
}

function drawDiscoveryLog() {
  if (!state.showLog) return;

  ctx.save();

  const panelW = Math.min(520, view.w - 36);
  const panelH = Math.min(520, view.h - 80);
  const x = view.cx - panelW / 2;
  const y = view.cy - panelH / 2;

  ctx.fillStyle = "rgba(8,13,24,0.84)";
  ctx.strokeStyle = "rgba(255,255,255,0.18)";

  roundRect(x, y, panelW, panelH, 26);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = "rgba(255,255,255,0.95)";
  ctx.font = "18px system-ui";
  ctx.textAlign = "left";
  ctx.fillText("Discovery Log", x + 26, y + 42);

  ctx.fillStyle = "rgba(255,255,255,0.52)";
  ctx.font = "12px system-ui";
  ctx.fillText("Press L to close", x + 26, y + 66);

  const entries = state.discoveryLog.slice(0, 10);

  if (!entries.length) {
    ctx.fillStyle = "rgba(255,255,255,0.6)";
    ctx.font = "14px system-ui";
    ctx.fillText("No places recorded yet.", x + 26, y + 112);
  }

  entries.forEach((entry, i) => {
    const rowY = y + 112 + i * 36;

    ctx.fillStyle = "rgba(255,255,255,0.88)";
    ctx.font = "14px system-ui";
    ctx.fillText(entry.name, x + 26, rowY);

    ctx.fillStyle = "rgba(255,255,255,0.44)";
    ctx.font = "11px system-ui";
    ctx.fillText(`${entry.type.toUpperCase()} · DAY ${entry.day} · ${entry.km}KM`, x + 26, rowY + 17);
  });

  ctx.restore();
}

function drawWorldMap() {
  if (!state.showMap) return;

  ctx.save();

  const panelW = Math.min(560, view.w - 36);
  const panelH = Math.min(560, view.h - 80);
  const x = view.cx - panelW / 2;
  const y = view.cy - panelH / 2;

  roundRect(x, y, panelW, panelH, 26);
  ctx.fillStyle = "rgba(8,13,24,0.86)";
  ctx.fill();
  ctx.strokeStyle = "rgba(255,255,255,0.18)";
  ctx.stroke();

  ctx.fillStyle = "rgba(255,255,255,0.95)";
  ctx.font = "18px system-ui";
  ctx.textAlign = "left";
  ctx.fillText("World Map", x + 26, y + 42);

  ctx.fillStyle = "rgba(255,255,255,0.52)";
  ctx.font = "12px system-ui";
  ctx.fillText("Press M to close · explored chunks persist", x + 26, y + 66);

  const mapX = x + 38;
  const mapY = y + 96;
  const mapW = panelW - 76;
  const mapH = panelH - 130;
  const cell = 10;

  ctx.fillStyle = "rgba(255,255,255,0.05)";
  roundRect(mapX, mapY, mapW, mapH, 18);
  ctx.fill();

  const size = CONFIG.world.chunkSize;
  const pcx = Math.floor(state.player.x / size);
  const pcy = Math.floor(state.player.y / size);

  for (let gy = -18; gy <= 18; gy++) {
    for (let gx = -22; gx <= 22; gx++) {
      const cx = pcx + gx;
      const cy = pcy + gy;
      const key = getChunkKey(cx, cy);
      const visited = state.visitedChunks.has(key);

      const px = mapX + mapW / 2 + gx * cell;
      const py = mapY + mapH / 2 + gy * cell;

      if (px < mapX + 10 || px > mapX + mapW - 10 || py < mapY + 10 || py > mapY + mapH - 10) continue;

      if (visited) {
        const terrain = getTerrainAt(cx * size + size / 2, cy * size + size / 2);
        ctx.fillStyle = terrainColour(terrain, 0.8);
        ctx.globalAlpha = 0.76;
        ctx.fillRect(px, py, cell - 2, cell - 2);
      } else {
        ctx.fillStyle = "rgba(255,255,255,0.05)";
        ctx.globalAlpha = 1;
        ctx.fillRect(px, py, cell - 3, cell - 3);
      }
    }
  }

  ctx.globalAlpha = 1;
  ctx.fillStyle = "#fb7185";
  ctx.beginPath();
  ctx.arc(mapX + mapW / 2, mapY + mapH / 2, 5, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "rgba(255,255,255,0.7)";
  ctx.font = "12px system-ui";
  ctx.fillText(`${state.visitedChunks.size} sectors mapped`, x + 26, y + panelH - 28);

  ctx.restore();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

/* =========================================================
   13. HUD UPDATE
========================================================= */

function updateHUD() {
  const hour = getHour();
  const h = Math.floor(hour);
  const m = Math.floor((hour - h) * 60);

  clockText.textContent = `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
  dayText.textContent = `DAY ${state.time.day}`;

  energyBar.style.width = `${state.player.energy}%`;
  staminaBar.style.width = `${state.player.stamina}%`;
  focusBar.style.width = `${state.player.focus}%`;

  distanceText.textContent = `${(state.distanceTravelled / 1000).toFixed(1)} KM WALKED`;

  regionName.textContent = getRegionName();
}

function updateMovementHUD() {
  const terrain = getTerrainProfile(state.player.lastTerrain);
  const speed = Math.round(Math.hypot(state.player.vx, state.player.vy));

  const action = getTerrainAction(state.player.lastTerrain).toUpperCase();
distanceText.textContent = `${(state.distanceTravelled / 1000).toFixed(1)} KM · ${speed} M/S · ${terrain.label} · ${action}`;
}

function updateWeatherHUD() {
  const weatherName = state.weather.current.toUpperCase();

  if (state.weather.strangeLight) {
    regionName.textContent = `${getRegionName()} · STRANGE LIGHTS`;
  } else {
    regionName.textContent = `${getRegionName()} · ${weatherName}`;
  }
}

/* =========================================================
   14. MAIN LOOP
========================================================= */

function update(dt) {
  if (!state.started || state.paused) return;

  updateTime(dt);
updateWeather(dt);
updatePlayer(dt);
  updateCamera(dt);
  updateDiscovery(dt);
updateTraversal(dt);
updateExplorationMemory();
updateHUD();
updateMovementHUD();
updateWeatherHUD();
}

function updateWeather(dt) {
  state.weather.timer += dt;

  if (state.weather.timer > 40) {
    state.weather.timer = 0;
    state.weather.current = chooseNextWeather();
  }

  state.weather.blend = lerp(
    state.weather.blend,
    1,
    CONFIG.weather.transitionSpeed
  );

  if (!state.weather.strangeLight && Math.random() < CONFIG.weather.strangeLightChance) {
    state.weather.strangeLight = true;
    state.weather.strangeLightTimer = 18;
  }

  if (state.weather.strangeLight) {
    state.weather.strangeLightTimer -= dt;

    if (state.weather.strangeLightTimer <= 0) {
      state.weather.strangeLight = false;
    }
  }
}

function render() {
  clearSky();
drawWeatherTint();
drawSunMoon();
drawDistantMountains();
drawStrangeLights();
  drawTerrain();
  drawLandmarks();
drawTraversalRings();
drawMovementTrail();
drawPlayer();
drawAtmosphere();
drawParticles(0.016);
drawDiscoveryNotification();
drawDiscoveryLog();
drawWorldMap();
drawTraversalMessage();
}

function loop(now) {
  const rawDt = (now - state.lastTime) / 1000;
  const dt = Math.min(0.033, rawDt);
  state.lastTime = now;

  update(dt);
  render();

  requestAnimationFrame(loop);
}

initParticles();

requestAnimationFrame(loop);

setInterval(() => {
  if (state.started) saveGame();
}, 5000);
</script>
