/* =========================================================
   01. CANVAS / BOOT SYSTEM
========================================================= */

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const App = {
  running: false,
  started: false,
  paused: false,
  lastTime: performance.now(),
  dt: 0,
  frame: 0,
  dpr: Math.max(1, Math.min(2, window.devicePixelRatio || 1)),
  view: { w: 0, h: 0, cx: 0, cy: 0 }
};

function resizeCanvas() {
  App.view.w = window.innerWidth;
  App.view.h = window.innerHeight;
  App.view.cx = App.view.w / 2;
  App.view.cy = App.view.h / 2;

  canvas.width = Math.floor(App.view.w * App.dpr);
  canvas.height = Math.floor(App.view.h * App.dpr);
  ctx.setTransform(App.dpr, 0, 0, App.dpr, 0, 0);
}

function bootGame() {
  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);
}

function startGame() {
  App.started = true;
  App.paused = false;
}

function pauseGame() {
  App.paused = true;
}

function resumeGame() {
  App.paused = false;
}

function hardResetGame() {
  SaveSystem.clear();
  location.reload();
}

/* =========================================================
   04. UTILITY LIBRARY
========================================================= */

const Utils = {
  clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
  },

  lerp(a, b, t) {
    return a + (b - a) * Utils.clamp(t, 0, 1);
  },

  dist(x1, y1, x2, y2) {
    return Math.hypot(x2 - x1, y2 - y1);
  },

  hash(n) {
    const x = Math.sin(n) * 43758.5453123;
    return x - Math.floor(x);
  },

  seededRandom(seed) {
    return Utils.hash(seed);
  },

  noise2D(x, y, seed = CONFIG.world.seed) {
    const ix = Math.floor(x);
    const iy = Math.floor(y);
    const fx = x - ix;
    const fy = y - iy;

    const h = (a, b) => Utils.hash(a * 127.1 + b * 311.7 + seed * 0.017);

    const a = h(ix, iy);
    const b = h(ix + 1, iy);
    const c = h(ix, iy + 1);
    const d = h(ix + 1, iy + 1);

    const ux = fx * fx * (3 - 2 * fx);
    const uy = fy * fy * (3 - 2 * fy);

    return Utils.lerp(Utils.lerp(a, b, ux), Utils.lerp(c, d, ux), uy);
  },

  fractalNoise(x, y, octaves = 5) {
    let total = 0;
    let amp = 1;
    let freq = 1;
    let norm = 0;

    for (let i = 0; i < octaves; i++) {
      total += Utils.noise2D(x * freq, y * freq) * amp;
      norm += amp;
      amp *= 0.5;
      freq *= 2;
    }

    return total / norm;
  },

  worldToScreen(x, y) {
    return {
      x: (x - STATE.camera.x) * STATE.camera.zoom + App.view.cx,
      y: (y - STATE.camera.y) * STATE.camera.zoom + App.view.cy
    };
  },

  screenToWorld(x, y) {
    return {
      x: (x - App.view.cx) / STATE.camera.zoom + STATE.camera.x,
      y: (y - App.view.cy) / STATE.camera.zoom + STATE.camera.y
    };
  }
};

/* =========================================================
   05. SAVE / LOAD SYSTEM
========================================================= */

const SaveSystem = {
  key: "nomad_20k_skeleton_save_v1",

  save() {
    const payload = {
      player: STATE.player,
      camera: STATE.camera,
      world: STATE.world,
      time: STATE.time,
      weather: STATE.weather,
      map: {
  ...STATE.map,
  visitedChunks: Array.from(STATE.map.visitedChunks || [])
},
discovery: {
  ...STATE.discovery,
  discovered: Array.from(STATE.discovery.discovered || [])
},
traversal: {
  ...STATE.traversal,
  ringsCompleted: Array.from(STATE.traversal.ringsCompleted || [])
},
progression: STATE.progression
    };

    localStorage.setItem(this.key, JSON.stringify(payload));
  },

  load() {
    try {
      const raw = localStorage.getItem(this.key);
      if (!raw) return;

      const data = JSON.parse(raw);

      if (data.player) Object.assign(STATE.player, data.player);
      if (data.camera) Object.assign(STATE.camera, data.camera);
      if (data.world) Object.assign(STATE.world, data.world);
      if (data.time) Object.assign(STATE.time, data.time);
      if (data.weather) Object.assign(STATE.weather, data.weather);
      if (data.map) {
  Object.assign(STATE.map, data.map);
  STATE.map.visitedChunks = new Set(data.map.visitedChunks || []);
}

if (data.discovery) {
  Object.assign(STATE.discovery, data.discovery);
  STATE.discovery.discovered = new Set(data.discovery.discovered || []);
}

if (data.traversal) {
  Object.assign(STATE.traversal, data.traversal);
  STATE.traversal.ringsCompleted = new Set(data.traversal.ringsCompleted || []);
}

if (data.progression) Object.assign(STATE.progression, data.progression);
    } catch (err) {
      console.warn("Save failed to load:", err);
    }
  },

  exportSave() {
    return localStorage.getItem(this.key) || "";
  },

  importSave(raw) {
    localStorage.setItem(this.key, raw);
    this.load();
  },

  clear() {
    localStorage.removeItem(this.key);
  }
};

/* =========================================================
   06. INPUT SYSTEM
========================================================= */

const InputSystem = {
  keys: STATE.input.keys,
  pressed: STATE.input.pressed,
  pointer: STATE.input.pointer,

  bind() {
    window.addEventListener("keydown", (e) => {
      this.keys[e.code] = true;
      this.pressed[e.code] = true;

      if (!App.started) startGame();
      if (e.code === "Escape") App.paused ? resumeGame() : pauseGame();
      if (e.code === "KeyR") hardResetGame();
    });

    window.addEventListener("keyup", (e) => {
      this.keys[e.code] = false;
    });

    canvas.addEventListener("pointerdown", (e) => {
      if (!App.started) startGame();

      this.pointer.active = true;
      this.pointer.startX = e.clientX;
      this.pointer.startY = e.clientY;
      this.pointer.x = e.clientX;
      this.pointer.y = e.clientY;
    });

    canvas.addEventListener("pointermove", (e) => {
      this.pointer.x = e.clientX;
      this.pointer.y = e.clientY;
    });

    window.addEventListener("pointerup", () => {
      this.pointer.active = false;
    });
  },

  update() {
    this.pressed = STATE.input.pressed;
  },

  endFrame() {
    STATE.input.pressed = {};
    this.pressed = STATE.input.pressed;
  },

  isDown(code) {
    return !!STATE.input.keys[code];
  },

  consumePress(code) {
    if (STATE.input.pressed[code]) {
      delete STATE.input.pressed[code];
      return true;
    }
    return false;
  },

  getMoveVector() {
    let x = 0;
    let y = 0;

    if (this.isDown("KeyW") || this.isDown("ArrowUp")) y -= 1;
    if (this.isDown("KeyS") || this.isDown("ArrowDown")) y += 1;
    if (this.isDown("KeyA") || this.isDown("ArrowLeft")) x -= 1;
    if (this.isDown("KeyD") || this.isDown("ArrowRight")) x += 1;

    if (STATE.input.pointer.active) {
      const dx = STATE.input.pointer.x - STATE.input.pointer.startX;
      const dy = STATE.input.pointer.y - STATE.input.pointer.startY;
      const mag = Math.hypot(dx, dy);

      if (mag > 10) {
        const strength = Utils.clamp(mag / 90, 0, 1);
        x += (dx / mag) * strength;
        y += (dy / mag) * strength;
      }
    }

    const mag = Math.hypot(x, y);
    if (mag > 0) {
      x /= mag;
      y /= mag;
    }

    return { x, y, active: mag > 0 };
  }
};

/* =========================================================
   07. CAMERA SYSTEM
========================================================= */

const CameraSystem = {
  update(dt) {
    this.followPlayer(dt);
    this.applyLead(dt);
  },

  followPlayer(dt) {
    const targetX = STATE.player.x + STATE.camera.leadX;
    const targetY = STATE.player.y + STATE.camera.leadY;

    STATE.camera.x = Utils.lerp(STATE.camera.x, targetX, CONFIG.camera.followSpeed * dt);
    STATE.camera.y = Utils.lerp(STATE.camera.y, targetY, CONFIG.camera.followSpeed * dt);
  },

  applyShake() {},

  applyLead(dt) {
    const speed = Math.hypot(STATE.player.vx, STATE.player.vy);
    const strength = Utils.clamp(speed / CONFIG.player.sprintSpeed, 0, 1);

    const tx = Math.cos(STATE.player.facing) * CONFIG.camera.leadStrength * strength;
    const ty = Math.sin(STATE.player.facing) * CONFIG.camera.leadStrength * strength;

    STATE.camera.leadX = Utils.lerp(STATE.camera.leadX, tx, CONFIG.camera.leadSpeed * dt);
    STATE.camera.leadY = Utils.lerp(STATE.camera.leadY, ty, CONFIG.camera.leadSpeed * dt);
  },

  setZoom(value) {
    STATE.camera.zoom = Utils.clamp(value, 0.5, 2.5);
  }
};

/* =========================================================
   08. TIME / DAY-NIGHT SYSTEM
========================================================= */

const TimeSystem = {
  update(dt) {
    STATE.time.elapsed += dt;

    if (STATE.time.elapsed >= CONFIG.time.dayLengthSeconds) {
      STATE.time.elapsed -= CONFIG.time.dayLengthSeconds;
      STATE.time.day++;
      SaveSystem.save();
    }
  },

  getDayProgress() {
    return STATE.time.elapsed / CONFIG.time.dayLengthSeconds;
  },

  getHour() {
    return (CONFIG.time.startHour + this.getDayProgress() * 24) % 24;
  },

  getLightLevel() {
    const hour = this.getHour();
    const daylight = Math.sin(((hour - 6) / 24) * Math.PI * 2);
    return Utils.clamp(daylight * 0.65 + 0.45, 0.08, 1);
  },

  getSkyPalette() {
    const hour = this.getHour();

    if (hour < 5 || hour > 21) return ["#111827", "#312e81", "#0f172a"];
    if (hour < 8) return ["#3b4b73", "#d89ca5", "#ffd6a5"];
    if (hour < 17) return ["#7aa6c2", "#b8d8d8", "#f2d3a0"];
    if (hour < 20) return ["#334766", "#b7798c", "#f5b56b"];

    return ["#1e293b", "#5b4b7a", "#111827"];
  }
};

/* =========================================================
   09. WEATHER / ATMOSPHERE SYSTEM
========================================================= */

const WeatherSystem = {
  profiles: {
    clear: { fog: 0.08, wind: 0.2, tint: "rgba(255,255,255,0)" },
    mist: { fog: 0.24, wind: 0.12, tint: "rgba(210,220,255,0.08)" },
    snow: { fog: 0.34, wind: 0.6, tint: "rgba(220,230,255,0.12)" },
    rain: { fog: 0.18, wind: 0.55, tint: "rgba(120,150,190,0.12)" }
  },

  update(dt) {
    if (!STATE.weather.timer) STATE.weather.timer = 0;
    STATE.weather.timer += dt;

    if (STATE.weather.timer > 45) {
      STATE.weather.timer = 0;
      STATE.weather.current = this.chooseWeather();
    }
  },

  chooseWeather() {
    const hour = TimeSystem.getHour();
    const r = Math.random();

    if (hour < 6 || hour > 21) {
      if (r < 0.5) return "mist";
    }

    if (r < 0.2) return "snow";
    if (r < 0.4) return "rain";
    if (r < 0.62) return "mist";
    return "clear";
  },

  getProfile() {
    return this.profiles[STATE.weather.current] || this.profiles.clear;
  },

  transitionWeather() {},
  spawnParticles() {},
  renderParticles() {}
};

/* =========================================================
   10. WORLD SEED / REGION SYSTEM
========================================================= */

const WorldSystem = {
  seed: CONFIG.world.seed,

  update() {
    STATE.world.regionName = this.getRegionName();
  },

  getRegionAt(x = STATE.player.x, y = STATE.player.y) {
    if (y < -3200) return "north";
    if (y > 3200) return "south";
    if (x < -3200) return "west";
    if (x > 3200) return "east";
    return "centre";
  },

  getRegionName(x = STATE.player.x, y = STATE.player.y) {
    const region = this.getRegionAt(x, y);

    const names = {
      north: "The Pale North",
      south: "South Glasslands",
      west: "The Broken West",
      east: "Amber Flats",
      centre: "The Forgotten Range"
    };

    return names[region] || names.centre;
  },

  getBiomeAt(x, y) {
    const terrain = TerrainSystem.getTerrainAt(x, y);

    if (terrain === "water") return "lake";
    if (terrain === "sand") return "dryland";
    if (terrain === "grass") return "range";
    if (terrain === "rock") return "ridge";
    if (terrain === "snow") return "alpine";

    return "range";
  },

  getWorldStats() {
    return {
      seed: STATE.world.seed,
      region: STATE.world.regionName,
      distanceKm: Number((STATE.world.distanceTravelled / 1000).toFixed(1))
    };
  }
};

/* =========================================================
   11. TERRAIN ENGINE
========================================================= */

const TerrainSystem = {
  profiles: {
    water: {
      speed: 0.42,
      acceleration: 0.55,
      friction: 2.8,
      staminaCost: 2.2,
      colourLight: "#577b9b",
      colourDark: "#3f647f",
      label: "Cold Water"
    },

    sand: {
      speed: 0.76,
      acceleration: 0.72,
      friction: 6.2,
      staminaCost: 1.2,
      colourLight: "#c8a77d",
      colourDark: "#a98966",
      label: "Soft Sand"
    },

    grass: {
      speed: 1,
      acceleration: 1,
      friction: 3.2,
      staminaCost: 0.2,
      colourLight: "#5f7f69",
      colourDark: "#425f52",
      label: "Open Ground"
    },

    rock: {
      speed: 0.82,
      acceleration: 0.78,
      friction: 2.2,
      staminaCost: 1.9,
      colourLight: "#5c6073",
      colourDark: "#3f4354",
      label: "Stone Ridge"
    },

    snow: {
      speed: 0.72,
      acceleration: 0.58,
      friction: 0.95,
      staminaCost: 0.8,
      colourLight: "#d6d8df",
      colourDark: "#9fa8ba",
      label: "Powder Snow"
    }
  },

  getHeightAt(x, y) {
    const n1 = Utils.fractalNoise(
      x * CONFIG.terrain.noiseScale,
      y * CONFIG.terrain.noiseScale
    );

    const n2 = Utils.fractalNoise(
      x * CONFIG.terrain.detailScale + 90,
      y * CONFIG.terrain.detailScale - 40
    );

    return n1 * 0.75 + n2 * 0.25;
  },

  getTerrainAt(x, y) {
    const h = this.getHeightAt(x, y);

    if (h < 0.28) return "water";
    if (h < 0.38) return "sand";
    if (h < 0.58) return "grass";
    if (h < 0.74) return "rock";
    return "snow";
  },

  getProfileAt(x, y) {
    const type = this.getTerrainAt(x, y);
    return this.profiles[type] || this.profiles.grass;
  },

  getSlopeAt(x, y) {
    const sample = 90;

    const left = this.getHeightAt(x - sample, y);
    const right = this.getHeightAt(x + sample, y);
    const up = this.getHeightAt(x, y - sample);
    const down = this.getHeightAt(x, y + sample);

    return {
      x: (left - right) * 2,
      y: (up - down) * 2
    };
  },

  getFrictionAt(x, y) {
    return this.getProfileAt(x, y).friction;
  },

  getTraversalCostAt(x, y) {
    return this.getProfileAt(x, y).staminaCost;
  },

  getColour(type, light = 1) {
    const p = this.profiles[type] || this.profiles.grass;
    return light > 0.5 ? p.colourLight : p.colourDark;
  },

  renderTerrain() {},
  renderContours() {},
  renderShadows() {}
};

/* =========================================================
   12. CHUNK STREAMING SYSTEM
========================================================= */

const ChunkSystem = {
  chunks: new Map(),

  getChunkKey(cx, cy) {
    return `${cx},${cy}`;
  },

  getChunkCoords(x, y) {
    return {
      x: Math.floor(x / CONFIG.world.chunkSize),
      y: Math.floor(y / CONFIG.world.chunkSize)
    };
  },

  getVisibleChunks() {
    const size = CONFIG.world.chunkSize;
    const cx = Math.floor(STATE.camera.x / size);
    const cy = Math.floor(STATE.camera.y / size);
    const chunks = [];

    for (let y = cy - CONFIG.world.renderRadius; y <= cy + CONFIG.world.renderRadius; y++) {
      for (let x = cx - CONFIG.world.renderRadius; x <= cx + CONFIG.world.renderRadius; x++) {
        chunks.push(this.generateChunk(x, y));
      }
    }

    return chunks;
  },

  generateChunk(cx, cy) {
    const key = this.getChunkKey(cx, cy);

    if (this.chunks.has(key)) {
      return this.chunks.get(key);
    }

    const size = CONFIG.world.chunkSize;
    const wx = cx * size;
    const wy = cy * size;
    const terrain = TerrainSystem.getTerrainAt(wx + size / 2, wy + size / 2);

    const chunk = {
      key,
      cx,
      cy,
      x: wx,
      y: wy,
      terrain,
      biome: WorldSystem.getBiomeAt(wx + size / 2, wy + size / 2),
      variation: Utils.noise2D(cx, cy)
    };

    this.chunks.set(key, chunk);
    return chunk;
  },

  unloadDistantChunks() {
    const current = this.getChunkCoords(STATE.camera.x, STATE.camera.y);
    const maxDist = CONFIG.world.renderRadius + 3;

    for (const [key, chunk] of this.chunks.entries()) {
      const d = Math.max(
        Math.abs(chunk.cx - current.x),
        Math.abs(chunk.cy - current.y)
      );

      if (d > maxDist) {
        this.chunks.delete(key);
      }
    }
  },

  update() {
    this.getVisibleChunks();
    this.unloadDistantChunks();
  },

  render() {}
};

/* =========================================================
   13. PLAYER MOVEMENT SYSTEM
========================================================= */

const PlayerSystem = {
  spawn() {
    STATE.player.x = CONFIG.player.spawnX;
    STATE.player.y = CONFIG.player.spawnY;
    STATE.player.vx = 0;
    STATE.player.vy = 0;
  },

  update(dt) {
    this.applyInput(dt);
    this.applyTerrainForces(dt);
    this.applyStamina(dt);
  },

  applyInput(dt) {
    const move = InputSystem.getMoveVector();
    const profile = TerrainSystem.getProfileAt(STATE.player.x, STATE.player.y);

    const sprinting =
      InputSystem.isDown("ShiftLeft") ||
      InputSystem.isDown("ShiftRight");

    const canSprint = sprinting && STATE.player.stamina > 2 && move.active;
    const baseSpeed = canSprint ? CONFIG.player.sprintSpeed : CONFIG.player.walkSpeed;

    const targetVx = move.x * baseSpeed * profile.speed;
    const targetVy = move.y * baseSpeed * profile.speed;

    if (move.active) {
      STATE.player.vx = Utils.lerp(
        STATE.player.vx,
        targetVx,
        CONFIG.player.acceleration * profile.acceleration * dt
      );

      STATE.player.vy = Utils.lerp(
        STATE.player.vy,
        targetVy,
        CONFIG.player.acceleration * profile.acceleration * dt
      );
    } else {
      STATE.player.vx = Utils.lerp(
        STATE.player.vx,
        0,
        profile.friction * dt
      );

      STATE.player.vy = Utils.lerp(
        STATE.player.vy,
        0,
        profile.friction * dt
      );
    }

    const speed = Math.hypot(STATE.player.vx, STATE.player.vy);

    if (speed > CONFIG.player.maxVelocity) {
      const scale = CONFIG.player.maxVelocity / speed;
      STATE.player.vx *= scale;
      STATE.player.vy *= scale;
    }

    const oldX = STATE.player.x;
    const oldY = STATE.player.y;

    STATE.player.x += STATE.player.vx * dt;
    STATE.player.y += STATE.player.vy * dt;

    STATE.world.distanceTravelled += Utils.dist(
      oldX,
      oldY,
      STATE.player.x,
      STATE.player.y
    );

    if (speed > 4) {
      STATE.player.facing = Math.atan2(STATE.player.vy, STATE.player.vx);
    }

    STATE.player.currentTerrain = TerrainSystem.getTerrainAt(
      STATE.player.x,
      STATE.player.y
    );

    STATE.player.currentTerrainLabel =
      TerrainSystem.getProfileAt(STATE.player.x, STATE.player.y).label;
  },

  applyTerrainForces(dt) {
    const terrain = TerrainSystem.getTerrainAt(STATE.player.x, STATE.player.y);
    const slope = TerrainSystem.getSlopeAt(STATE.player.x, STATE.player.y);

    if (terrain === "snow" || terrain === "rock") {
      const assist = terrain === "snow" ? 34 : 22;
      STATE.player.vx += slope.x * assist * dt;
      STATE.player.vy += slope.y * assist * dt;
    }

    if (terrain === "water") {
      STATE.player.vx *= 1 - 0.8 * dt;
      STATE.player.vy *= 1 - 0.8 * dt;
    }
  },

  applyStamina(dt) {
    const moving = Math.hypot(STATE.player.vx, STATE.player.vy) > 5;
    const sprinting =
      InputSystem.isDown("ShiftLeft") ||
      InputSystem.isDown("ShiftRight");

    const cost = TerrainSystem.getTraversalCostAt(STATE.player.x, STATE.player.y);

    if (sprinting && moving) {
      STATE.player.stamina -= (CONFIG.player.staminaDrain + cost) * dt;
    } else if (moving && cost > 0.7) {
      STATE.player.stamina -= cost * dt;
    } else {
      STATE.player.stamina += CONFIG.player.staminaRecover * dt;
    }

    STATE.player.stamina = Utils.clamp(STATE.player.stamina, 0, 100);
  },

  render() {}
};

/* =========================================================
   14. TRAVERSAL SYSTEM
========================================================= */

const TraversalSystem = {
  getRingRadius() {
    return CONFIG.traversal.ringRadius || 34;
  },

  update(dt) {
    const ring = PuzzleSystem.getNearbyTraversalRing();

    if (ring && !this.hasCompletedRing(ring.id)) {
      const speed = Math.hypot(STATE.player.vx, STATE.player.vy);
      const needsSpeed = ring.type === "glide-ring" || ring.type === "ridge-ring";

      if (!needsSpeed || speed > 110) {
        this.completeRing(ring);
      }
    }

    if (STATE.traversal.messageTimer > 0) {
      STATE.traversal.messageTimer -= dt;
    }
  },

  hasCompletedRing(id) {
    return STATE.traversal.ringsCompleted?.has(id);
  },

  completeRing(ring) {
    if (!STATE.traversal.ringsCompleted) {
      STATE.traversal.ringsCompleted = new Set();
    }

    STATE.traversal.ringsCompleted.add(ring.id);

    STATE.player.focus = Utils.clamp(STATE.player.focus + 6, 0, 100);
    STATE.player.stamina = Utils.clamp(STATE.player.stamina + 10, 0, 100);

    STATE.traversal.message =
      ring.type === "glide-ring"
        ? "Glide line found"
        : ring.type === "ridge-ring"
          ? "Ridge route mastered"
          : "Path marker crossed";

    STATE.traversal.messageTimer = 2.8;
    SaveSystem.save();
  },

  climb() {},
  slide() {},
  glide() {},
  dash() {},
  wallRun() {},
  ridgeRun() {},
  detectTraversalOpportunity() {}
};

/* =========================================================
   15. TRAVERSAL PUZZLE SYSTEM
========================================================= */

const PuzzleSystem = {
  update() {},

  generatePuzzle() {},

  getTraversalRingsInChunk(cx, cy) {
    const items = [];
    const roll = Utils.noise2D(cx - 31, cy + 47);

    if (roll < 0.82) return items;

    const size = CONFIG.world.chunkSize;
    const x = cx * size + Utils.noise2D(cx + 91, cy - 14) * size;
    const y = cy * size + Utils.noise2D(cx - 22, cy + 83) * size;

    const terrain = TerrainSystem.getTerrainAt(x, y);
    const altitude = TerrainSystem.getHeightAt(x, y);

    if (terrain === "water") return items;

    const type =
      altitude > 0.68
        ? "ridge-ring"
        : terrain === "snow"
          ? "glide-ring"
          : "path-ring";

    const id = `ring:${type}:${cx}:${cy}`;

    items.push({
      id,
      type,
      x,
      y,
      terrain,
      completed: STATE.traversal.ringsCompleted?.has(id)
    });

    return items;
  },

  getNearbyTraversalRing() {
    const chunks = ChunkSystem.getVisibleChunks();

    for (const chunk of chunks) {
      const rings = this.getTraversalRingsInChunk(chunk.cx, chunk.cy);

      for (const ring of rings) {
        if (STATE.traversal.ringsCompleted?.has(ring.id)) continue;

        const d = Utils.dist(STATE.player.x, STATE.player.y, ring.x, ring.y);

        if (d <= TraversalSystem.getRingRadius()) {
          return ring;
        }
      }
    }

    return null;
  },

  checkPuzzleCompletion() {},
  renderPuzzleObjects() {},
  rewardPlayer() {}
};

/* =========================================================
   16. LANDMARK SYSTEM
========================================================= */

const LandmarkSystem = {
  types: ["beacon", "ruin", "camp", "stone", "tower"],

  megaTypes: ["arch", "observatory", "cable", "tower"],

  getLandmarkName(type, cx, cy) {
    const prefixes = {
      beacon: ["Old", "Silent", "Amber", "North", "Fallen"],
      ruin: ["Broken", "Grey", "Hollow", "Sunken", "Forgotten"],
      camp: ["Last", "Cold", "Low", "Ash", "Wanderer's"],
      stone: ["White", "Black", "Split", "Ancient", "Glass"],
      tower: ["Signal", "Watch", "Storm", "Pale", "Far"],
      arch: ["Giant", "Dawn", "Weathered", "Twin", "High"],
      observatory: ["Moon", "Star", "Upper", "Cloud", "Final"],
      cable: ["Old", "Rust", "Eastern", "Broken", "High"]
    };

    const nouns = {
      beacon: ["Beacon", "Light", "Marker", "Signal", "Flare"],
      ruin: ["Ruin", "Gatehouse", "Shelter", "Station", "Steps"],
      camp: ["Camp", "Outpost", "Fireplace", "Rest", "Tent"],
      stone: ["Stone", "Monolith", "Marker", "Pillar", "Shard"],
      tower: ["Tower", "Relay", "Spire", "Needle", "Watch"],
      arch: ["Arch", "Pass", "Crown", "Span", "Gate"],
      observatory: ["Observatory", "Lens", "Dome", "Eye", "Platform"],
      cable: ["Cableway", "Lift", "Line", "Crossing", "Gantry"]
    };

    const p = prefixes[type] || prefixes.stone;
    const n = nouns[type] || nouns.stone;

    const a = p[Math.floor(Utils.noise2D(cx + 4, cy - 9) * p.length)];
    const b = n[Math.floor(Utils.noise2D(cx - 6, cy + 13) * n.length)];

    return `${a} ${b}`;
  },

  generateLandmarksForChunk(cx, cy) {
    const items = [];
    const size = CONFIG.world.chunkSize;
    const roll = Utils.noise2D(cx, cy);

    if (roll > 0.72) {
      const type = this.types[Math.floor(Utils.noise2D(cx + 1, cy + 1) * this.types.length)];
      const id = `${type}:${cx}:${cy}`;

      items.push({
        id,
        type,
        name: this.getLandmarkName(type, cx, cy),
        x: cx * size + Utils.noise2D(cx + 13, cy - 7) * size,
        y: cy * size + Utils.noise2D(cx - 4, cy + 19) * size,
        scale: 1,
        mega: false
      });
    }

    const megaRoll = Utils.noise2D(cx * 3, cy * 3);

    if (megaRoll > 0.955) {
      const type = this.megaTypes[Math.floor(Utils.noise2D(cx + 17, cy - 11) * this.megaTypes.length)];
      const id = `mega:${type}:${cx}:${cy}`;

      items.push({
        id,
        type,
        name: this.getLandmarkName(type, cx, cy),
        x: cx * size + size * 0.5,
        y: cy * size + size * 0.5,
        scale: 2.5 + Utils.noise2D(cx - 2, cy + 8) * 1.6,
        mega: true
      });
    }

    return items;
  },

  getNearbyLandmark() {
    const chunks = ChunkSystem.getVisibleChunks();
    const radius = CONFIG.discovery.interactionRadius || 82;

    for (const chunk of chunks) {
      const landmarks = this.generateLandmarksForChunk(chunk.cx, chunk.cy);

      for (const lm of landmarks) {
        if (DiscoverySystem.hasDiscovered(lm.id)) continue;

        const d = Utils.dist(STATE.player.x, STATE.player.y, lm.x, lm.y);

        if (d <= radius) {
          return lm;
        }
      }
    }

    return null;
  },

  update(dt) {
    const nearby = this.getNearbyLandmark();

    STATE.landmarks.nearby = nearby || null;

    if (nearby && InputSystem.consumePress("KeyE")) {
      this.activateLandmark(nearby);
    }
  },

  activateLandmark(lm) {
    DiscoverySystem.discover(lm);
  },

  renderLandmarks() {},
  renderMegaLandmarks() {}
};

/* =========================================================
   17. DISCOVERY SYSTEM
========================================================= */

const DiscoverySystem = {
  log: [],

  ensureState() {
    if (!STATE.discovery.discovered) STATE.discovery.discovered = new Set();
    if (!STATE.discovery.log) STATE.discovery.log = [];
  },

  update(dt) {
    this.ensureState();

    if (STATE.discovery.notificationTimer > 0) {
      STATE.discovery.notificationTimer -= dt;
    }

    if (InputSystem.consumePress("KeyL")) {
      STATE.discovery.showLog = !STATE.discovery.showLog;
    }
  },

  discover(lm) {
    this.ensureState();

    if (STATE.discovery.discovered.has(lm.id)) return;

    STATE.discovery.discovered.add(lm.id);

    const entry = {
      id: lm.id,
      name: lm.name,
      type: lm.type,
      x: Math.round(lm.x),
      y: Math.round(lm.y),
      day: STATE.time.day,
      km: Number((STATE.world.distanceTravelled / 1000).toFixed(1))
    };

    STATE.discovery.log.unshift(entry);
    STATE.discovery.log = STATE.discovery.log.slice(0, 100);

    STATE.discovery.notification = `Discovered: ${lm.name}`;
    STATE.discovery.notificationTimer = 4;

    STATE.player.focus = Utils.clamp(STATE.player.focus + (lm.mega ? 16 : 8), 0, 100);

    SaveSystem.save();
  },

  hasDiscovered(id) {
    this.ensureState();
    return STATE.discovery.discovered.has(id);
  },

  renderNotification() {},
  renderDiscoveryLog() {}
};

/* =========================================================
   18. MAP / FOG OF WAR SYSTEM
========================================================= */

const MapSystem = {
  visitedChunks: new Set(),

  ensureState() {
    if (!STATE.map.visitedChunks) STATE.map.visitedChunks = new Set();
  },

  update() {
    this.ensureState();
    this.markVisited();

    if (InputSystem.consumePress("KeyM")) {
      STATE.map.showMap = !STATE.map.showMap;
    }
  },

  markVisited() {
    const coords = ChunkSystem.getChunkCoords(STATE.player.x, STATE.player.y);
    const key = ChunkSystem.getChunkKey(coords.x, coords.y);
    STATE.map.visitedChunks.add(key);
  },

  renderWorldMap() {},
  renderMiniMap() {},

  calculateCompletion() {
    return STATE.map.visitedChunks?.size || 0;
  }
};

/* =========================================================
   19. DYNAMIC HORIZON EVENT SYSTEM
========================================================= */

const HorizonEventSystem = {
  activeEvents: [],

  update(dt) {
    if (!STATE.world.eventTimer) STATE.world.eventTimer = 0;
    STATE.world.eventTimer += dt;

    if (STATE.world.eventTimer > 55) {
      STATE.world.eventTimer = 0;
      this.spawnEvent();
    }

    this.activeEvents = this.activeEvents.filter(event => {
      event.life -= dt;
      return event.life > 0;
    });
  },

  spawnEvent() {
    if (this.activeEvents.length >= 3) return;

    const angle = Math.random() * Math.PI * 2;
    const distance = 1800 + Math.random() * 2800;

    const types = ["distant-light", "meteor", "signal-pulse", "aurora"];
    const type = types[Math.floor(Math.random() * types.length)];

    this.activeEvents.push({
      id: `event:${Date.now()}:${Math.random()}`,
      type,
      x: STATE.player.x + Math.cos(angle) * distance,
      y: STATE.player.y + Math.sin(angle) * distance,
      life: 30 + Math.random() * 40,
      age: 0,
      discovered: false
    });

    UISystem.showToast("Something moved on the horizon");
  },

  resolveEvent(event) {
    if (!event || event.discovered) return;

    event.discovered = true;
    STATE.player.focus = Utils.clamp(STATE.player.focus + 4, 0, 100);
    ProgressionSystem.grantMilestone("horizon-witness");
  },

  renderDistantEvents() {}
};

/* =========================================================
   20. RELIC / COLLECTIBLE SYSTEM
========================================================= */

const RelicSystem = {
  relics: [],

  update(dt) {
    if (!STATE.relics) STATE.relics = { collected: [] };

    const nearby = this.getNearbyRelic();

    if (nearby && InputSystem.consumePress("KeyF")) {
      this.collectRelic(nearby);
    }
  },

  generateRelic(cx, cy) {
    const roll = Utils.noise2D(cx + 400, cy - 170);

    if (roll < 0.965) return null;

    const size = CONFIG.world.chunkSize;
    const types = ["map-fragment", "signal-core", "old-token", "glass-shard"];
    const type = types[Math.floor(Utils.noise2D(cx - 13, cy + 91) * types.length)];

    return {
      id: `relic:${type}:${cx}:${cy}`,
      type,
      name: this.getRelicName(type),
      x: cx * size + Utils.noise2D(cx + 31, cy + 7) * size,
      y: cy * size + Utils.noise2D(cx - 21, cy - 12) * size
    };
  },

  getRelicName(type) {
    const names = {
      "map-fragment": "Weathered Map Fragment",
      "signal-core": "Dormant Signal Core",
      "old-token": "Nomad Token",
      "glass-shard": "Blue Glass Shard"
    };

    return names[type] || "Unknown Relic";
  },

  getNearbyRelic() {
    const chunks = ChunkSystem.getVisibleChunks();

    for (const chunk of chunks) {
      const relic = this.generateRelic(chunk.cx, chunk.cy);
      if (!relic) continue;

      if (STATE.relics?.collected?.includes(relic.id)) continue;

      const d = Utils.dist(STATE.player.x, STATE.player.y, relic.x, relic.y);
      if (d < 52) return relic;
    }

    return null;
  },

  collectRelic(relic) {
    if (!STATE.relics) STATE.relics = { collected: [] };
    if (STATE.relics.collected.includes(relic.id)) return;

    STATE.relics.collected.push(relic.id);
    STATE.player.focus = Utils.clamp(STATE.player.focus + 10, 0, 100);

    UISystem.showToast(`Relic found: ${relic.name}`);
    ProgressionSystem.grantMilestone("first-relic");
    SaveSystem.save();
  },

  renderRelics() {},
  renderRelicJournal() {}
};

/* =========================================================
   21. PROGRESSION / UNLOCK SYSTEM
========================================================= */

const ProgressionSystem = {
  update() {
    const km = STATE.world.distanceTravelled / 1000;

    if (km >= 1) this.grantMilestone("walked-1km");
    if (km >= 5) this.grantMilestone("walked-5km");
    if ((STATE.discovery.log?.length || 0) >= 5) this.grantMilestone("five-discoveries");
    if ((STATE.map.visitedChunks?.size || 0) >= 25) this.grantMilestone("mapped-25-sectors");
  },

  ensureState() {
    if (!STATE.progression.milestones) STATE.progression.milestones = [];
    if (!STATE.progression.unlocks) STATE.progression.unlocks = [];
  },

  grantMilestone(id) {
    this.ensureState();

    if (STATE.progression.milestones.includes(id)) return;

    STATE.progression.milestones.push(id);
    UISystem.showToast(`Milestone: ${this.getMilestoneLabel(id)}`);
    SaveSystem.save();
  },

  getMilestoneLabel(id) {
    const labels = {
      "walked-1km": "First kilometre",
      "walked-5km": "Range walker",
      "five-discoveries": "Cartographer's eye",
      "mapped-25-sectors": "Land reader",
      "horizon-witness": "Horizon witness",
      "first-relic": "First relic"
    };

    return labels[id] || id;
  },

  unlockAbility(id) {
    this.ensureState();

    if (!STATE.progression.unlocks.includes(id)) {
      STATE.progression.unlocks.push(id);
      UISystem.showToast(`Unlocked: ${id}`);
    }
  },

  unlockCosmetic(id) {
    this.unlockAbility(`cosmetic:${id}`);
  },

  calculatePlayerRank() {
    this.ensureState();

    const points =
      STATE.progression.milestones.length * 10 +
      STATE.progression.unlocks.length * 5;

    if (points >= 100) return "Pathfinder";
    if (points >= 50) return "Wayfarer";
    if (points >= 20) return "Walker";

    return "Nomad";
  }
};

/* =========================================================
   22. JOURNEY / QUEST SYSTEM
========================================================= */

const JourneySystem = {
  update() {
    if (!STATE.journey) {
      STATE.journey = {
        current: "reach-first-light",
        step: 0,
        completed: []
      };
    }

    const nearby = STATE.landmarks.nearby;

    if (
      STATE.journey.current === "reach-first-light" &&
      nearby &&
      nearby.type === "beacon"
    ) {
      STATE.journey.step = 1;
    }

    if (
      STATE.journey.current === "reach-first-light" &&
      (STATE.discovery.log || []).some(entry => entry.type === "beacon")
    ) {
      this.completeStep("reach-first-light");
    }
  },

  createJourney(id) {
    STATE.journey = {
      current: id,
      step: 0,
      completed: STATE.journey?.completed || []
    };
  },

  completeStep(id) {
    if (!STATE.journey.completed.includes(id)) {
      STATE.journey.completed.push(id);
      UISystem.showToast("Journey updated");
      ProgressionSystem.grantMilestone(id);
    }
  },

  getObjectiveText() {
    if (!STATE.journey) return "Follow the old lights";

    if (STATE.journey.completed.includes("reach-first-light")) {
      return "Cross the range and map what remains";
    }

    if (STATE.journey.step === 1) {
      return "Mark the beacon with E";
    }

    return "Find the first old light";
  },

  renderJourneyHUD() {}
};

/* =========================================================
   23. AUDIO SYSTEM
========================================================= */

const AudioSystem = {
  enabled: false,
  ctx: null,

  init() {
    if (this.ctx) return;

    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (!AudioContext) return;

    this.ctx = new AudioContext();
    this.enabled = true;
  },

  playTone(freq = 220, duration = 0.12, gain = 0.04) {
    if (!this.ctx || !this.enabled) return;

    const osc = this.ctx.createOscillator();
    const amp = this.ctx.createGain();

    osc.frequency.value = freq;
    amp.gain.value = gain;

    osc.connect(amp);
    amp.connect(this.ctx.destination);

    osc.start();
    osc.stop(this.ctx.currentTime + duration);
  },

  updateAmbience() {},

  setWeatherLayer() {},

  setBiomeLayer() {}
};

/* =========================================================
   24. UI / HUD SYSTEM
========================================================= */

const UISystem = {
  update(dt) {
    if (STATE.ui.toastTimer > 0) {
      STATE.ui.toastTimer -= dt;
    }

    STATE.ui.objective = JourneySystem.getObjectiveText();
    STATE.ui.region = WorldSystem.getRegionName();
    STATE.ui.rank = ProgressionSystem.calculatePlayerRank();
    STATE.ui.weather = STATE.weather.current || "clear";
    STATE.ui.distanceKm = Number((STATE.world.distanceTravelled / 1000).toFixed(1));
    STATE.ui.terrain = STATE.player.currentTerrainLabel || "Open Ground";
    STATE.ui.speed = Math.round(Math.hypot(STATE.player.vx, STATE.player.vy));
  },

  showToast(text, seconds = 3.2) {
    STATE.ui.toast = text;
    STATE.ui.toastTimer = seconds;

    if (AudioSystem.enabled) {
      AudioSystem.playTone(260, 0.08, 0.025);
    }
  },

  hideToast() {
    STATE.ui.toast = "";
    STATE.ui.toastTimer = 0;
  },

  renderHUD() {},
  renderOverlay() {}
};

/* =========================================================
   25. DEBUG / DEVTOOLS SYSTEM
========================================================= */

const DebugSystem = {
  enabled: false,
  logs: [],
  toggle() {},
  log() {},
  render() {},
  runDiagnostics() {}
};

/* =========================================================
   26. RENDER PIPELINE
========================================================= */

const RenderPipeline = {
  clear() {},
  renderSky() {},
  renderBackground() {},
  renderWorld() {},
  renderEntities() {},
  renderForeground() {},
  renderUI() {},
  render() {}
};

/* =========================================================
   27. UPDATE PIPELINE
========================================================= */

function update(dt) {
  InputSystem.update(dt);
  TimeSystem.update(dt);
  WeatherSystem.update(dt);
  WorldSystem.update(dt);
  ChunkSystem.update(dt);
  PlayerSystem.update(dt);
  TraversalSystem.update(dt);
  PuzzleSystem.update(dt);
  LandmarkSystem.update(dt);
  DiscoverySystem.update(dt);
  MapSystem.update(dt);
  HorizonEventSystem.update(dt);
  RelicSystem.update(dt);
  ProgressionSystem.update(dt);
  JourneySystem.update(dt);
  AudioSystem.updateAmbience(dt);
  UISystem.update(dt);
}

/* =========================================================
   28. MAIN LOOP
========================================================= */

function loop(now) {
  App.dt = Math.min(0.033, (now - App.lastTime) / 1000);
  App.lastTime = now;
  App.frame++;

  if (App.running && !App.paused) {
    update(App.dt);
  }

  RenderPipeline.render(App.dt);
  requestAnimationFrame(loop);
}

/* =========================================================
   29. INITIALISATION
========================================================= */

function init() {
  bootGame();
  InputSystem.bind();
  SaveSystem.load();
  App.running = true;
  requestAnimationFrame(loop);
}

init();
</script>
